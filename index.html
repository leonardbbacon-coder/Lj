<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lily Of The Valley</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="not-loaded">

<h1 id="title" class="title"></h1>

<div class="night"></div>

<div class="stars"></div>

<div class="fireflies">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="flowers">

    <!-- LEFT FLOWER -->
    <div class="lily lily-left">

        <div class="stem"></div>

        <div class="leaf leaf1"></div>
        <div class="leaf leaf2"></div>
        <div class="leaf leaf3"></div>

        <div class="bells">

            <div class="bell bell1">
                <div class="petal"></div>
            </div>

            <div class="bell bell2">
                <div class="petal"></div>
            </div>

            <div class="bell bell3">
                <div class="petal"></div>
            </div>

            <div class="bell bell4">
                <div class="petal"></div>
            </div>

            <div class="bell bell5">
                <div class="petal"></div>
            </div>

            <div class="bell bell6">
                <div class="petal"></div>
            </div>

        </div>

    </div>


    <!-- CENTER FLOWER -->
    <div class="lily lily-center">

        <div class="stem"></div>

        <div class="leaf leaf1"></div>
        <div class="leaf leaf2"></div>
        <div class="leaf leaf3"></div>

        <div class="bells">

            <div class="bell bell1"><div class="petal"></div></div>
            <div class="bell bell2"><div class="petal"></div></div>
            <div class="bell bell3"><div class="petal"></div></div>
            <div class="bell bell4"><div class="petal"></div></div>
            <div class="bell bell5"><div class="petal"></div></div>
            <div class="bell bell6"><div class="petal"></div></div>
            <div class="bell bell7"><div class="petal"></div></div>

        </div>

    </div>



    <!-- RIGHT FLOWER -->
    <div class="lily lily-right">

        <div class="stem"></div>

        <div class="leaf leaf1"></div>
        <div class="leaf leaf2"></div>
        <div class="leaf leaf3"></div>

        <div class="bells">

            <div class="bell bell1"><div class="petal"></div></div>
            <div class="bell bell2"><div class="petal"></div></div>
            <div class="bell bell3"><div class="petal"></div></div>
            <div class="bell bell4"><div class="petal"></div></div>
            <div class="bell bell5"><div class="petal"></div></div>
            <div class="bell bell6"><div class="petal"></div></div>

        </div>

    </div>

</div>

<div class="ground"></div>

<script src="script.js"></script>

</body>
</html>
