<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lily of the Valley</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="not-loaded">

<div class="sky"></div>
<div class="moon"></div>
<div class="stars"></div>
<div class="mist"></div>
<div class="fireflies"></div>

<h1 id="title"></h1>

<div class="garden">

    <!-- LEFT FLOWER -->
    <div class="flower flower-left">
        <div class="stem"></div>
        <div class="branch branch1"></div>
        <div class="branch branch2"></div>
        <div class="branch branch3"></div>
        <div class="bells left-bells"></div>
        <div class="leaf leaf-left1"></div>
        <div class="leaf leaf-left2"></div>
    </div>

    <!-- CENTER FLOWER -->
    <div class="flower flower-center">
        <div class="stem"></div>
        <div class="branch branch1"></div>
        <div class="branch branch2"></div>
        <div class="branch branch3"></div>
        <div class="branch branch4"></div>
        <div class="bells center-bells"></div>
        <div class="leaf leaf-left1"></div>
        <div class="leaf leaf-right1"></div>
    </div>

    <!-- RIGHT FLOWER -->
    <div class="flower flower-right">
        <div class="stem"></div>
        <div class="branch branch1"></div>
        <div class="branch branch2"></div>
        <div class="branch branch3"></div>
        <div class="bells right-bells"></div>
        <div class="leaf leaf-right1"></div>
        <div class="leaf leaf-right2"></div>
    </div>

</div>

<div class="grass"></div>

<script src="script.js"></script>
</body>
</html>
